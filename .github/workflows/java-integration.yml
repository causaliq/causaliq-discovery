name: Java Integration

on:
  workflow_dispatch:
    inputs:
      java_profile:
        description: "Pinned Java artefact profile"
        required: false
        default: "tetrad_fges_1_3_0"
        type: choice
        options:
          - tetrad_fges_1_3_0
          - custom
      jar_tag:
        description: "Override release tag (optional)"
        required: false
        default: ""
        type: string
      jar_asset_name:
        description: "Override release asset name (optional)"
        required: false
        default: ""
        type: string
      jar_sha256:
        description: "Override SHA256 checksum (optional)"
        required: false
        default: ""
        type: string

jobs:
  java-integration:
    name: Java Integration (${{ matrix.os }}, Python 3.11)
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install causaliq-discovery
        run: >
          pip install -e ".[dev]"
          --extra-index-url https://test.pypi.org/simple/

      - name: Verify third-party binaries token
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.THIRD_PARTY_BINARIES_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            throw (
              "Missing secret THIRD_PARTY_BINARIES_TOKEN. " +
              "This workflow needs read access to the " +
              "causaliq/third-party-binaries releases."
            )
          }

      - name: Resolve Java profile and overrides
        shell: pwsh
        run: |
          $profile = "${{ inputs.java_profile }}"

          if ($profile -eq "tetrad_fges_1_3_0") {
            $tag = "causal-cmd-1.3.0-causaliq.1"
            $assetName = "causal-cmd-1.3.0-jar-with-dependencies.jar"
            $sha256 = (
              "AD888C038AD6E1E48339CDB3E58520FA9169E682" +
              "5DE7C2F979989F8B869CED4E"
            )
          } elseif ($profile -eq "custom") {
            $tag = "${{ inputs.jar_tag }}"
            $assetName = "${{ inputs.jar_asset_name }}"
            $sha256 = "${{ inputs.jar_sha256 }}"
            if (-not $tag -or -not $assetName -or -not $sha256) {
              throw (
                "For java_profile=custom, provide jar_tag, " +
                "jar_asset_name, and jar_sha256."
              )
            }
          } else {
            throw "Unsupported java_profile: $profile"
          }

          if ("${{ inputs.jar_tag }}") {
            $tag = "${{ inputs.jar_tag }}"
          }
          if ("${{ inputs.jar_asset_name }}") {
            $assetName = "${{ inputs.jar_asset_name }}"
          }
          if ("${{ inputs.jar_sha256 }}") {
            $sha256 = "${{ inputs.jar_sha256 }}"
          }

          "CQ_JAVA_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV `
            -Encoding utf8 -Append
          "CQ_JAVA_ASSET_NAME=$assetName" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CQ_JAVA_SHA256=$sha256" | Out-File -FilePath $env:GITHUB_ENV `
            -Encoding utf8 -Append

          Write-Host "Java profile: $profile"
          Write-Host "Release tag: $tag"
          Write-Host "Asset name: $assetName"

      - name: Download pinned causal-cmd JAR
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.THIRD_PARTY_BINARIES_TOKEN }}
        run: |
          ./tests/integration/setup/fetch-causal-cmd-jar.ps1 `
            -Tag "$env:CQ_JAVA_TAG" `
            -AssetName "$env:CQ_JAVA_ASSET_NAME" `
            -ExpectedSha256 "$env:CQ_JAVA_SHA256"

      - name: Export CQ_JAVA_DIR
        shell: pwsh
        run: |
          $jarDir = Join-Path (Resolve-Path .) ".artifacts"
          "CQ_JAVA_DIR=$jarDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Java integration tests
        run: python -m pytest -m java_integration -v --no-cov
