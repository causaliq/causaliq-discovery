name: R Integration

on:
  workflow_dispatch:

jobs:
  r-integration:
    name: R Integration (${{ matrix.os }}, Python 3.11)
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:/Users/runneradmin/AppData/Local/R/win-library' || '/home/runner/work/_temp/Library' }}
          key: r-pkgs-${{ runner.os }}-bnlearn

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install bnlearn
        run: Rscript -e "install.packages('bnlearn')"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install causaliq-discovery
        run: >
          pip install -e ".[dev]"
          --extra-index-url https://test.pypi.org/simple/

      - name: Run R integration tests
        run: python -m pytest -m r_integration -v --no-cov
